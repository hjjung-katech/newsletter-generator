name: Ops Safety Monitor

on:
  schedule:
    # Weekly (Monday 02:00 UTC)
    - cron: '0 2 * * 1'
  workflow_dispatch:

permissions:
  contents: read

env:
  PYTHON_VERSION: '3.12'

jobs:
  contract-monitor:
    name: Contract Monitor (Idempotency/Scheduler)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run contract integration checks
        env:
          RUN_INTEGRATION_TESTS: '1'
          MOCK_MODE: 'true'
          TESTING: '1'
          PYTHONPATH: ${{ github.workspace }}
          OPENAI_API_KEY: test-key
          SERPER_API_KEY: test-key
          GEMINI_API_KEY: test-key
          ANTHROPIC_API_KEY: test-key
          POSTMARK_SERVER_TOKEN: dummy-token
          EMAIL_SENDER: test@example.com
        run: |
          pytest tests/test_web_api.py tests/integration/test_schedule_execution.py tests/unit_tests/test_schedule_time_sync.py --tb=short --junitxml=test-results-ops-contract.xml

      - name: Upload contract results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-ops-contract
          path: test-results-ops-contract.xml

  real-api-monitor:
    name: Real API Integration Monitor
    runs-on: ubuntu-latest
    needs: [contract-monitor]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run real API integration tests when secrets are available
        env:
          RUN_INTEGRATION_TESTS: '1'
          TESTING: '1'
          PYTHONPATH: ${{ github.workspace }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY || '' }}
          SERPER_API_KEY: ${{ secrets.SERPER_API_KEY || '' }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY || '' }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY || '' }}
          POSTMARK_SERVER_TOKEN: ${{ secrets.POSTMARK_SERVER_TOKEN || '' }}
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER || 'test@example.com' }}
          TEST_EMAIL_RECIPIENT: ${{ secrets.TEST_EMAIL_RECIPIENT || 'test@example.com' }}
        run: |
          if [ -z "$OPENAI_API_KEY" ] || [ -z "$SERPER_API_KEY" ]; then
            echo "Skipping real API monitor: OPENAI_API_KEY or SERPER_API_KEY is not configured."
            exit 0
          fi
          pytest -m integration --tb=short --junitxml=test-results-ops-real-api.xml

      - name: Upload real API monitor results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-ops-real-api
          path: test-results-ops-real-api.xml
