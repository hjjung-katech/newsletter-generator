name: Shell Size Gate

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write  # required for posting PR comments

jobs:
  shell-size-gate:
    name: shell-size-gate
    runs-on: ubuntu-latest
    continue-on-error: true  # soft-gate: never blocks CI

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Measure freeze module sizes
        run: |
          python3 scripts/measure_module_size.py | tee size_report.md
          # Always append to Step Summary (visible even for fork PRs)
          cat size_report.md >> "$GITHUB_STEP_SUMMARY"

      - name: Post size report as PR comment
        # Fork PRs: GITHUB_TOKEN has no pull-requests:write — skip comment posting
        if: github.event.pull_request.head.repo.fork == false
        continue-on-error: true  # comment failure must not fail the job
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('size_report.md', 'utf8');
            const marker = '## Freeze Module Size Report';

            // Reuse an existing bot comment instead of spamming new ones
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(
              c => c.user.type === 'Bot' && c.body.includes(marker)
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
