name: 🔒 Security Scan

on:
  schedule:
    # 매주 월요일 오전 2시 (UTC)에 정기 스캔
    - cron: '0 2 * * 1'
  workflow_dispatch:
    inputs:
      full_scan:
        description: 'Run full security scan including Docker'
        required: false
        type: boolean
        default: true
  pull_request:
    paths:
      - '**.py'
      - 'requirements*.txt'
      - 'pyproject.toml'
      - 'Dockerfile'
      - '.github/workflows/security-scan.yml'
      - '.secrets.baseline'

permissions:
  contents: read
  security-events: write
  actions: read
  pull-requests: read

jobs:
  detect-secrets:
    name: 🕵️ Secret Detection
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install detect-secrets
        run: |
          python -m pip install --upgrade pip
          pip install detect-secrets

      - name: Run detect-secrets against baseline
        run: |
          if [ ! -f .secrets.baseline ]; then
            echo "::error::.secrets.baseline missing — run 'detect-secrets scan > .secrets.baseline' and commit."
            exit 1
          fi
          # Snapshot results (excluding volatile generated_at) before scan
          jq 'del(.generated_at)' .secrets.baseline > /tmp/baseline.before.json
          # Update baseline in-place (merges new findings while preserving audit labels)
          detect-secrets scan --baseline .secrets.baseline
          jq 'del(.generated_at)' .secrets.baseline > /tmp/baseline.after.json
          # Fail if substantive content changed — new unaudited secrets were detected
          if ! diff -q /tmp/baseline.before.json /tmp/baseline.after.json > /dev/null; then
            echo "::error::New secrets detected. Review diff, audit via 'detect-secrets audit .secrets.baseline', then commit the updated baseline."
            diff -u /tmp/baseline.before.json /tmp/baseline.after.json || true
            exit 1
          fi

      - name: Upload scan results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: secrets-scan-results
          path: .secrets.baseline

  bandit-security:
    name: 🛡️ Python Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
          pip install "safety<3"

      - name: Run Bandit security scan (high severity / high confidence only)
        run: |
          bandit -r newsletter/ newsletter_core/ web/ \
            -f json -o bandit-report.json \
            --severity-level high --confidence-level high \
            --skip B104,B110,B404,B603 || BANDIT_EXIT=$?
          bandit -r newsletter/ newsletter_core/ web/ \
            -f txt \
            --severity-level high --confidence-level high \
            --skip B104,B110,B404,B603 || true
          exit ${BANDIT_EXIT:-0}

      - name: Run Safety check (advisory)
        run: |
          safety check --json --output safety-report.json || true
          safety check || true

      - name: Upload security reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: |
            bandit-report.json
            safety-report.json

  trivy-fs-scan:
    name: 🔍 Filesystem Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner in fs mode
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-fs-results.sarif'
          severity: 'CRITICAL,HIGH,MEDIUM'
          exit-code: '0'

      - name: Upload Trivy scan results to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-fs-results.sarif'
          category: trivy-fs

      - name: Run Trivy vulnerability scanner (table output)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          severity: 'CRITICAL,HIGH'

  trivy-docker-scan:
    name: 🐳 Docker Image Security Scan
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && github.event.inputs.full_scan == 'true')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t newsletter-app:latest .

      - name: Run Trivy vulnerability scanner on Docker image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'newsletter-app:latest'
          format: 'sarif'
          output: 'trivy-docker-results.sarif'
          severity: 'CRITICAL,HIGH,MEDIUM'
          exit-code: '0'

      - name: Upload Trivy Docker scan results
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-docker-results.sarif'
          category: trivy-docker

      - name: Run Trivy Docker scan (table output)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'newsletter-app:latest'
          format: 'table'
          severity: 'CRITICAL,HIGH'

  dependency-review:
    name: 📦 Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high

  security-summary:
    name: 📊 Security Summary
    runs-on: ubuntu-latest
    needs: [detect-secrets, bandit-security, trivy-fs-scan]
    if: always()
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create security summary
        run: |
          echo "# 🔒 Security Scan Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Scan Results:" >> $GITHUB_STEP_SUMMARY
          echo "- **Secret Detection**: ${{ needs.detect-secrets.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Python Security (Bandit)**: ${{ needs.bandit-security.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Filesystem Scan (Trivy)**: ${{ needs.trivy-fs-scan.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 🛡️ Centralized Settings Security Features:" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ SecretStr type for sensitive data" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Automatic secret masking in logs" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Environment variable validation" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ .env file exclusion from Docker images" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -f security-reports/bandit-report.json ]; then
            echo "## Bandit Issues (HIGH severity / HIGH confidence):" >> $GITHUB_STEP_SUMMARY
            jq -r '.results[] | "- **\(.issue_severity)**: \(.issue_text) (\(.filename):\(.line_number))"' security-reports/bandit-report.json >> $GITHUB_STEP_SUMMARY || echo "_No issues found or report unreadable._" >> $GITHUB_STEP_SUMMARY
          fi
