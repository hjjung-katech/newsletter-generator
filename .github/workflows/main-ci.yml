name: Main CI Pipeline

on:
  push:
    branches: [main, develop, 'feature/**', 'feat/**', 'fix/**', 'chore/**', 'docs/**', 'refactor/**', 'release/**', 'codex/**']
  pull_request:
    branches: [main, develop]

permissions:
  contents: read
  checks: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Default interpreter for non-matrix jobs (quality/mock/integration/report)
  PYTHON_VERSION: '3.12'
  CACHE_VERSION: v1
  # Prepared toggle for Phase 3 hard-gate transition.
  REPO_HYGIENE_STRICT: 'false'

jobs:
  # ========================================
  # Stage 1: Code Quality & Security
  # ========================================
  quality-checks:
    name: Code Quality & Security
    runs-on: ubuntu-latest
    outputs:
      runtime_changed: ${{ steps.changed-python.outputs.runtime_changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Cache dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cache/pip
            ~/.cache/pre-commit
          key: ${{ runner.os }}-quality-${{ env.CACHE_VERSION }}-${{ hashFiles('requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-quality-${{ env.CACHE_VERSION }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Keep formatter/linter versions aligned with .pre-commit-config.yaml.
          pip install black==23.12.1 isort==5.13.2 flake8==7.0.0 mypy bandit
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Detect changed Python files (scoped)
        id: changed-python
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.sha }}"
            RANGE="$BASE_SHA...$HEAD_SHA"
          else
            BEFORE_SHA="${{ github.event.before }}"
            if [ -z "$BEFORE_SHA" ] || [ "$BEFORE_SHA" = "0000000000000000000000000000000000000000" ]; then
              BEFORE_SHA="$(git rev-parse HEAD^)"
            fi
            RANGE="$BEFORE_SHA...${{ github.sha }}"
          fi

          CHANGED="$(git diff --name-only "$RANGE" | grep -E '^(newsletter|tests|web|scripts|apps|packages/newsletter_core|newsletter_core)/.*\.py$' || true)"
          RUNTIME_CHANGED="false"
          if echo "$CHANGED" | grep -E '^(newsletter|web|apps|packages/newsletter_core|newsletter_core)/.*\.py$' >/dev/null; then
            RUNTIME_CHANGED="true"
          fi
          {
            echo "files<<EOF"
            echo "$CHANGED"
            echo "EOF"
            echo "runtime_changed=$RUNTIME_CHANGED"
          } >> "$GITHUB_OUTPUT"

          if [ -n "$CHANGED" ]; then
            echo "Changed Python files:"
            echo "$CHANGED"
          else
            echo "No scoped Python file changes detected."
          fi

      - name: Code formatting (Black)
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${{ steps.changed-python.outputs.files }}" ]; then
            echo "Skip Black: no scoped Python file changes."
            exit 0
          fi
          echo "${{ steps.changed-python.outputs.files }}" | xargs black --check --diff

      - name: Import sorting (isort)
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${{ steps.changed-python.outputs.files }}" ]; then
            echo "Skip isort: no scoped Python file changes."
            exit 0
          fi
          echo "${{ steps.changed-python.outputs.files }}" | xargs isort --check-only --diff --profile black

      - name: Linting (flake8)
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${{ steps.changed-python.outputs.files }}" ]; then
            echo "Skip flake8: no scoped Python file changes."
            exit 0
          fi
          echo "${{ steps.changed-python.outputs.files }}" | xargs flake8 --max-line-length=88 --ignore=E203,W503,E501

      - name: Architecture boundary check
        run: |
          python scripts/architecture/check_import_boundaries.py --mode ratchet
          python scripts/architecture/check_import_cycles.py

      - name: Repo hygiene audit (soft gate)
        shell: bash
        run: |
          set -euo pipefail
          STRICT_ARGS=()
          if [ "${REPO_HYGIENE_STRICT}" = "true" ]; then
            STRICT_ARGS+=(--strict)
            echo "Repo hygiene strict mode: ENABLED" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Repo hygiene strict mode: DISABLED (soft gate)" >> "$GITHUB_STEP_SUMMARY"
          fi
          python scripts/repo_audit.py \
            --policy scripts/repo_hygiene_policy.json \
            --output-dir artifacts/repo-audit \
            --check-policy \
            "${STRICT_ARGS[@]}"
          cat artifacts/repo-audit/policy_warnings.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload repo audit artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: repo-audit-${{ github.run_id }}
          path: artifacts/repo-audit/

      - name: Type checking (mypy)
        shell: bash
        run: |
          set -euo pipefail
          RUNTIME_FILES="$(echo "${{ steps.changed-python.outputs.files }}" | grep -E '^(newsletter|web|apps|packages/newsletter_core|newsletter_core)/.*\.py$' || true)"
          STRICT_RUNTIME_FILES="$RUNTIME_FILES"
          if [ -z "$STRICT_RUNTIME_FILES" ]; then
            echo "Skip mypy: no runtime Python file changes."
            exit 0
          fi

          FILE_TARGETS=()
          MODULE_TARGETS=()
          while IFS= read -r file; do
            [ -z "$file" ] && continue
            if [[ "$file" == web/*.py ]]; then
              module="${file%.py}"
              module="${module//\//.}"
              MODULE_TARGETS+=("$module")
            else
              FILE_TARGETS+=("$file")
            fi
          done <<< "$STRICT_RUNTIME_FILES"

          BASE_MYPY_ARGS=(--ignore-missing-imports --follow-imports=skip)

          if [ "${#FILE_TARGETS[@]}" -gt 0 ]; then
            mypy "${BASE_MYPY_ARGS[@]}" "${FILE_TARGETS[@]}"
          fi

          if [ "${#MODULE_TARGETS[@]}" -gt 0 ]; then
            MODULE_MYPY_ARGS=()
            for module in "${MODULE_TARGETS[@]}"; do
              MODULE_MYPY_ARGS+=("-m" "$module")
            done
            mypy "${BASE_MYPY_ARGS[@]}" "${MODULE_MYPY_ARGS[@]}"
          fi

      - name: Basic security scan (Bandit)
        shell: bash
        run: |
          set -euo pipefail
          RUNTIME_FILES="$(echo "${{ steps.changed-python.outputs.files }}" | grep -E '^(newsletter|web|apps|packages/newsletter_core|newsletter_core)/.*\.py$' || true)"
          STRICT_RUNTIME_FILES="$RUNTIME_FILES"
          if [ -z "$STRICT_RUNTIME_FILES" ]; then
            echo "Skip bandit: no runtime Python file changes."
            exit 0
          fi
          echo "$STRICT_RUNTIME_FILES" | xargs bandit -f txt --skip B104,B110

  # ========================================
  # Stage 2: Unit Tests (Multi-Platform)
  # ========================================
  unit-tests:
    name: Unit Tests - ubuntu-latest-py${{ matrix.python-version }}
    needs: [quality-checks]
    if: |
      needs.quality-checks.outputs.runtime_changed == 'true'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        # py3.10 temporarily excluded due PyO3/cryptography import instability in CI
        python-version: ['3.11', '3.12']

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Create required directories
        run: |
          mkdir -p output
          mkdir -p output/test_results
          mkdir -p debug_files
          mkdir -p templates
        shell: bash

      - name: Run unit tests
        env:
          MOCK_MODE: 'true'
          TESTING: '1'
          PYTHONPATH: ${{ github.workspace }}
          # Dummy test environment variables
          OPENAI_API_KEY: test-key
          SERPER_API_KEY: test-key
          GEMINI_API_KEY: test-key
          ANTHROPIC_API_KEY: test-key
          POSTMARK_SERVER_TOKEN: dummy-token
          EMAIL_SENDER: test@example.com
        run: |
          pytest -m unit --tb=short --junitxml=test-results-unit.xml --cov=newsletter --cov-report=xml --cov-report=html

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-unit-${{ matrix.os }}-${{ matrix.python-version }}
          path: |
            test-results-*.xml
            coverage.xml
            htmlcov/

  # ========================================
  # Stage 3: Mock API Tests
  # ========================================
  mock-api-tests:
    name: Mock API Tests
    needs: [unit-tests]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Create required directories
        run: |
          mkdir -p output
          mkdir -p debug_files
          mkdir -p templates

      - name: Run mock API tests
        env:
          MOCK_MODE: 'true'
          TESTING: '1'
          PYTHONPATH: ${{ github.workspace }}
          OPENAI_API_KEY: test-key
          SERPER_API_KEY: test-key
          GEMINI_API_KEY: test-key
          ANTHROPIC_API_KEY: test-key
          POSTMARK_SERVER_TOKEN: dummy-token
          EMAIL_SENDER: test@example.com
        run: |
          pytest -m mock_api --tb=short --junitxml=test-results-mock-api.xml

      - name: Run web mail tests
        env:
          MOCK_MODE: 'true'
          TESTING: '1'
          PYTHONPATH: ${{ github.workspace }}
          POSTMARK_SERVER_TOKEN: dummy-token
          EMAIL_SENDER: test@example.com
        run: |
          pytest tests/test_web_mail.py -v --tb=short

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-mock-api
          path: test-results-*.xml

  # ========================================
  # Stage 4: Integration Tests (Optional)
  # ========================================
  integration-tests:
    name: Integration Tests
    needs: [mock-api-tests]
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Create required directories
        run: |
          mkdir -p output
          mkdir -p debug_files
          mkdir -p templates

      - name: Run scheduler integration contracts (always)
        env:
          RUN_INTEGRATION_TESTS: '1'
          TESTING: '1'
          PYTHONPATH: ${{ github.workspace }}
          OPENAI_API_KEY: test-key
          SERPER_API_KEY: test-key
          GEMINI_API_KEY: test-key
          ANTHROPIC_API_KEY: test-key
          POSTMARK_SERVER_TOKEN: dummy-token
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER || 'test@example.com' }}
          TEST_EMAIL_RECIPIENT: ${{ secrets.TEST_EMAIL_RECIPIENT || 'test@example.com' }}
        run: |
          pytest tests/integration/test_schedule_execution.py tests/unit_tests/test_schedule_time_sync.py --tb=short --junitxml=test-results-integration-contracts.xml

      - name: Run real API integration tests (optional)
        env:
          RUN_INTEGRATION_TESTS: '1'
          TESTING: '1'
          PYTHONPATH: ${{ github.workspace }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY || '' }}
          SERPER_API_KEY: ${{ secrets.SERPER_API_KEY || '' }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY || '' }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY || '' }}
          POSTMARK_SERVER_TOKEN: ${{ secrets.POSTMARK_SERVER_TOKEN || '' }}
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER || 'test@example.com' }}
          TEST_EMAIL_RECIPIENT: ${{ secrets.TEST_EMAIL_RECIPIENT || 'test@example.com' }}
        run: |
          if [ -z "$OPENAI_API_KEY" ] || [ -z "$SERPER_API_KEY" ]; then
            echo "Skipping real API integration tests - required secrets missing"
            exit 0
          fi
          pytest -m integration --tb=short --junitxml=test-results-integration.xml

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-integration
          path: test-results-*.xml

  # ========================================
  # Stage 5: Test Reports
  # ========================================
  test-report:
    name: Test Report & Coverage
    needs: [unit-tests, mock-api-tests]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - uses: actions/checkout@v4

      - name: Download all test results
        uses: actions/download-artifact@v4
        with:
          pattern: test-results-*
          merge-multiple: true

      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: |
            test-results-*.xml
          check_name: Test Results
          comment_mode: always

      - name: Generate test summary
        run: |
          echo "## 🧪 Test Results Summary" >> $GITHUB_STEP_SUMMARY
          echo "### Coverage Report" >> $GITHUB_STEP_SUMMARY
          if [ -f coverage.xml ]; then
            echo "✅ Coverage report generated successfully" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Coverage report not found" >> $GITHUB_STEP_SUMMARY
          fi

  # ========================================
  # Stage 6: Build Check
  # ========================================
  build-check:
    name: Build Check
    needs: [mock-api-tests]
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller build

      - name: Test package build
        run: |
          python -m build

      - name: Test PyInstaller build (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          python scripts/devtools/build_web_exe_enhanced.py
        continue-on-error: true

      - name: Upload build artifacts
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts-${{ matrix.os }}
          path: |
            dist/
            *.exe
            *.spec
