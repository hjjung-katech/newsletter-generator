name: Main CI Pipeline

on:
  push:
    branches: [main, develop, 'release/**']
  pull_request:
    branches: [main, develop]

permissions:
  actions: read
  contents: read
  checks: write
  pull-requests: write

concurrency:
  # Use PR number when present to cancel superseded reruns on the same PR.
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref_name }}
  cancel-in-progress: true

env:
  # Default interpreter for non-matrix jobs (quality/mock/integration/report)
  PYTHON_VERSION: '3.12'
  CACHE_VERSION: v1
  # Hard gate is enabled by default; allow temporary override only if needed.
  REPO_HYGIENE_STRICT: 'true'

jobs:
  # ========================================
  # Stage 1: Code Quality & Security
  # ========================================
  quality-checks:
    name: Code Quality & Security
    runs-on: ubuntu-latest
    outputs:
      runtime_changed: ${{ steps.changed-python.outputs.runtime_changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Cache dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cache/pip
            ~/.cache/pre-commit
          key: ${{ runner.os }}-quality-${{ env.CACHE_VERSION }}-${{ hashFiles('requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-quality-${{ env.CACHE_VERSION }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Keep formatter/linter versions aligned with .pre-commit-config.yaml.
          pip install black==23.12.1 isort==5.13.2 flake8==7.0.0 mypy bandit
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Detect changed Python files (scoped)
        id: changed-python
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.sha }}"
            RANGE="$BASE_SHA...$HEAD_SHA"
          else
            BEFORE_SHA="${{ github.event.before }}"
            if [ -z "$BEFORE_SHA" ] || [ "$BEFORE_SHA" = "0000000000000000000000000000000000000000" ]; then
              BEFORE_SHA="$(git rev-parse HEAD^)"
            fi
            RANGE="$BEFORE_SHA...${{ github.sha }}"
          fi

          # Exclude deleted files so file-based linters do not fail on moved paths.
          CHANGED="$(git diff --name-only --diff-filter=ACMR "$RANGE" | grep -E '^(newsletter|tests|web|scripts|apps|packages/newsletter_core|newsletter_core)/.*\.py$' || true)"
          RUNTIME_CHANGED="false"
          if echo "$CHANGED" | grep -E '^(newsletter|web|apps|packages/newsletter_core|newsletter_core)/.*\.py$' >/dev/null; then
            RUNTIME_CHANGED="true"
          fi
          {
            echo "files<<EOF"
            echo "$CHANGED"
            echo "EOF"
            echo "runtime_changed=$RUNTIME_CHANGED"
          } >> "$GITHUB_OUTPUT"

          if [ -n "$CHANGED" ]; then
            echo "Changed Python files:"
            echo "$CHANGED"
          else
            echo "No scoped Python file changes detected."
          fi

      - name: Code formatting (Black)
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${{ steps.changed-python.outputs.files }}" ]; then
            echo "Skip Black: no scoped Python file changes."
            exit 0
          fi
          echo "${{ steps.changed-python.outputs.files }}" | xargs black --check --diff

      - name: Import sorting (isort)
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${{ steps.changed-python.outputs.files }}" ]; then
            echo "Skip isort: no scoped Python file changes."
            exit 0
          fi
          echo "${{ steps.changed-python.outputs.files }}" | xargs isort --check-only --diff --profile black

      - name: Linting (flake8)
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${{ steps.changed-python.outputs.files }}" ]; then
            echo "Skip flake8: no scoped Python file changes."
            exit 0
          fi
          echo "${{ steps.changed-python.outputs.files }}" | xargs flake8 --max-line-length=88 --ignore=E203,W503,E501

      - name: Architecture boundary check
        run: |
          python scripts/architecture/check_import_boundaries.py --mode ratchet
          python scripts/architecture/check_import_cycles.py

      - name: Guard legacy web_types paths
        shell: bash
        run: |
          set -euo pipefail
          if command -v rg >/dev/null 2>&1; then
            FORBIDDEN_REFS="$(rg -n 'web/web_types\.py|web\.web_types' web scripts tests \
              --glob '!web/runtime_hook.py' || true)"
          else
            FORBIDDEN_REFS="$(grep -RInE 'web/web_types\.py|web\.web_types' web scripts tests \
              --exclude='runtime_hook.py' || true)"
          fi
          if [ -n "$FORBIDDEN_REFS" ]; then
            echo "Legacy web_types references are not allowed outside runtime compatibility alias:"
            echo "$FORBIDDEN_REFS"
            exit 1
          fi
          echo "No legacy web_types references detected."

      - name: Guard runtime output literals (ASCII-safe)
        shell: bash
        run: |
          set -euo pipefail
          python scripts/devtools/check_runtime_ascii_output.py

      - name: Repo hygiene audit (gate)
        shell: bash
        run: |
          set -euo pipefail
          STRICT_ARGS=()
          if [ "${REPO_HYGIENE_STRICT}" = "true" ]; then
            STRICT_ARGS+=(--strict)
            echo "Repo hygiene strict mode: ENABLED" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Repo hygiene strict mode: DISABLED (temporary soft gate override)" >> "$GITHUB_STEP_SUMMARY"
          fi
          python scripts/repo_audit.py \
            --policy scripts/repo_hygiene_policy.json \
            --output-dir artifacts/repo-audit \
            --check-policy \
            "${STRICT_ARGS[@]}"
          cat artifacts/repo-audit/policy_warnings.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload repo audit artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: repo-audit-${{ github.run_id }}
          path: artifacts/repo-audit/

      - name: Type checking (mypy)
        shell: bash
        run: |
          set -euo pipefail
          RUNTIME_FILES="$(echo "${{ steps.changed-python.outputs.files }}" | grep -E '^(newsletter|web|apps|packages/newsletter_core|newsletter_core)/.*\.py$' || true)"
          STRICT_RUNTIME_FILES="$RUNTIME_FILES"
          if [ -z "$STRICT_RUNTIME_FILES" ]; then
            echo "Skip mypy: no runtime Python file changes."
            exit 0
          fi

          FILE_TARGETS=()
          MODULE_TARGETS=()
          while IFS= read -r file; do
            [ -z "$file" ] && continue
            if [[ "$file" == web/*.py ]]; then
              module="${file%.py}"
              module="${module//\//.}"
              MODULE_TARGETS+=("$module")
            else
              FILE_TARGETS+=("$file")
            fi
          done <<< "$STRICT_RUNTIME_FILES"

          BASE_MYPY_ARGS=(--ignore-missing-imports --follow-imports=skip)

          if [ "${#FILE_TARGETS[@]}" -gt 0 ]; then
            mypy "${BASE_MYPY_ARGS[@]}" "${FILE_TARGETS[@]}"
          fi

          if [ "${#MODULE_TARGETS[@]}" -gt 0 ]; then
            MODULE_MYPY_ARGS=()
            for module in "${MODULE_TARGETS[@]}"; do
              MODULE_MYPY_ARGS+=("-m" "$module")
            done
            mypy "${BASE_MYPY_ARGS[@]}" "${MODULE_MYPY_ARGS[@]}"
          fi

      - name: Basic security scan (Bandit)
        shell: bash
        run: |
          set -euo pipefail
          RUNTIME_FILES="$(echo "${{ steps.changed-python.outputs.files }}" | grep -E '^(newsletter|web|apps|packages/newsletter_core|newsletter_core)/.*\.py$' || true)"
          STRICT_RUNTIME_FILES="$RUNTIME_FILES"
          if [ -z "$STRICT_RUNTIME_FILES" ]; then
            echo "Skip bandit: no runtime Python file changes."
            exit 0
          fi
          echo "$STRICT_RUNTIME_FILES" | xargs bandit -f txt --skip B104,B110

  # ========================================
  # Stage 2: Unit Tests (Multi-Platform)
  # ========================================
  unit-tests:
    name: Unit Tests - ubuntu-latest-py${{ matrix.python-version }}
    needs: [quality-checks]
    if: |
      needs.quality-checks.outputs.runtime_changed == 'true'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        # py3.10 temporarily excluded due PyO3/cryptography import instability in CI
        python-version: ['3.11', '3.12']

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Create required directories
        run: |
          mkdir -p output
          mkdir -p output/test_results
          mkdir -p debug_files
          mkdir -p templates
        shell: bash

      - name: Run unit tests
        env:
          MOCK_MODE: 'true'
          TESTING: '1'
          PYTHONPATH: ${{ github.workspace }}
          # Dummy test environment variables
          OPENAI_API_KEY: test-key
          SERPER_API_KEY: test-key
          GEMINI_API_KEY: test-key
          ANTHROPIC_API_KEY: test-key
          POSTMARK_SERVER_TOKEN: dummy-token
          EMAIL_SENDER: test@example.com
        run: |
          pytest -m unit --tb=short --junitxml=test-results-unit.xml --cov=newsletter --cov-report=xml --cov-report=html

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-unit-${{ matrix.os }}-${{ matrix.python-version }}
          path: |
            test-results-*.xml
            coverage.xml
            htmlcov/

  # ========================================
  # Stage 3: Mock API Tests
  # ========================================
  mock-api-tests:
    name: Mock API Tests
    needs: [unit-tests]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Create required directories
        run: |
          mkdir -p output
          mkdir -p debug_files
          mkdir -p templates

      - name: Run mock API tests
        env:
          MOCK_MODE: 'true'
          TESTING: '1'
          PYTHONPATH: ${{ github.workspace }}
          OPENAI_API_KEY: test-key
          SERPER_API_KEY: test-key
          GEMINI_API_KEY: test-key
          ANTHROPIC_API_KEY: test-key
          POSTMARK_SERVER_TOKEN: dummy-token
          EMAIL_SENDER: test@example.com
        run: |
          pytest -m mock_api --tb=short --junitxml=test-results-mock-api.xml

      - name: Run web mail tests
        env:
          MOCK_MODE: 'true'
          TESTING: '1'
          PYTHONPATH: ${{ github.workspace }}
          POSTMARK_SERVER_TOKEN: dummy-token
          EMAIL_SENDER: test@example.com
        run: |
          pytest tests/test_web_mail.py -v --tb=short

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-mock-api
          path: test-results-*.xml

  # ========================================
  # Stage 4: Integration Tests (Optional)
  # ========================================
  integration-tests:
    name: Integration Tests
    needs: [mock-api-tests]
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Create required directories
        run: |
          mkdir -p output
          mkdir -p debug_files
          mkdir -p templates

      - name: Run scheduler integration contracts (always)
        env:
          RUN_INTEGRATION_TESTS: '1'
          TESTING: '1'
          PYTHONPATH: ${{ github.workspace }}
          OPENAI_API_KEY: test-key
          SERPER_API_KEY: test-key
          GEMINI_API_KEY: test-key
          ANTHROPIC_API_KEY: test-key
          POSTMARK_SERVER_TOKEN: dummy-token
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER || 'test@example.com' }}
          TEST_EMAIL_RECIPIENT: ${{ secrets.TEST_EMAIL_RECIPIENT || 'test@example.com' }}
        run: |
          pytest tests/integration/test_schedule_execution.py tests/unit_tests/test_schedule_time_sync.py --tb=short --junitxml=test-results-integration-contracts.xml

      - name: Run real API integration tests (optional)
        env:
          RUN_INTEGRATION_TESTS: '1'
          TESTING: '1'
          PYTHONPATH: ${{ github.workspace }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY || '' }}
          SERPER_API_KEY: ${{ secrets.SERPER_API_KEY || '' }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY || '' }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY || '' }}
          POSTMARK_SERVER_TOKEN: ${{ secrets.POSTMARK_SERVER_TOKEN || '' }}
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER || 'test@example.com' }}
          TEST_EMAIL_RECIPIENT: ${{ secrets.TEST_EMAIL_RECIPIENT || 'test@example.com' }}
        run: |
          if [ -z "$OPENAI_API_KEY" ] || [ -z "$SERPER_API_KEY" ]; then
            echo "Skipping real API integration tests - required secrets missing"
            exit 0
          fi
          pytest -m integration --tb=short --junitxml=test-results-integration.xml

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-integration
          path: test-results-*.xml

  # ========================================
  # Stage 5: Test Reports
  # ========================================
  test-report:
    name: Test Report & Coverage
    needs: [unit-tests, mock-api-tests]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - uses: actions/checkout@v4

      - name: Download all test results
        uses: actions/download-artifact@v4
        with:
          pattern: test-results-*
          merge-multiple: true

      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: |
            test-results-*.xml
          check_name: Test Results
          comment_mode: always

      - name: Generate test summary
        run: |
          echo "## 🧪 Test Results Summary" >> $GITHUB_STEP_SUMMARY
          echo "### Coverage Report" >> $GITHUB_STEP_SUMMARY
          if [ -f coverage.xml ]; then
            echo "✅ Coverage report generated successfully" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Coverage report not found" >> $GITHUB_STEP_SUMMARY
          fi

  # ========================================
  # Stage 6: Build Check
  # ========================================
  build-check:
    name: Build Check (${{ matrix.os }})
    needs: [quality-checks]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        os: [windows-latest, ubuntu-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          # Retry is allowed only for transient network failures.
          retry_pip_install() {
            local attempt=1
            local max_attempts=3
            local wait_seconds=5
            local log_file
            log_file="$(mktemp)"
            while true; do
              if python -m pip install "$@" 2>"$log_file"; then
                rm -f "$log_file"
                return 0
              fi

              if [ "$attempt" -ge "$max_attempts" ]; then
                cat "$log_file"
                rm -f "$log_file"
                return 1
              fi

              if grep -Eiq "ReadTimeout|timed out|Connection broken|Temporary failure|Could not fetch URL|Connection reset|503 Service Unavailable|Name or service not known" "$log_file"; then
                echo "Transient network failure detected. Retrying pip install ($attempt/$max_attempts)..."
                attempt=$((attempt + 1))
                sleep "$wait_seconds"
                wait_seconds=$((wait_seconds * 2))
                continue
              fi

              cat "$log_file"
              rm -f "$log_file"
              return 1
            done
          }

          python -m pip install --upgrade pip
          retry_pip_install -r requirements.txt
          retry_pip_install pyinstaller build requests

      - name: Test package build
        if: matrix.os != 'windows-latest'
        run: |
          python -m build

      - name: Test PyInstaller build (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          python scripts/devtools/build_web_exe_enhanced.py

      - name: Sign Windows artifact (OV pilot)
        id: sign-windows
        if: matrix.os == 'windows-latest'
        shell: pwsh
        env:
          WINDOWS_OV_CERT_SHA1: ${{ secrets.WINDOWS_OV_CERT_SHA1 || '' }}
          WINDOWS_SIGNING_REQUIRED: ${{ startsWith(github.ref, 'refs/heads/release/') }}
        run: |
          $required = "$env:WINDOWS_SIGNING_REQUIRED" -eq "true"
          ./scripts/devtools/sign_windows_exe.ps1 -ExePath "dist\newsletter_web.exe" -CertSha1 "$env:WINDOWS_OV_CERT_SHA1" -RequireSignature:$required
          if ($required -or -not [string]::IsNullOrWhiteSpace("$env:WINDOWS_OV_CERT_SHA1")) {
            "signing_status=signed" >> $env:GITHUB_OUTPUT
          } else {
            "signing_status=unsigned" >> $env:GITHUB_OUTPUT
          }

      - name: Windows EXE health smoke
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          ./scripts/devtools/windows_exe_smoke.ps1 -ExePath "dist\newsletter_web.exe" -BaseUrl "http://127.0.0.1:58080" -TimeoutSeconds 120

      - name: Generate Windows release metadata
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          python scripts/devtools/generate_windows_release_artifacts.py \
            --artifact dist/newsletter_web.exe \
            --output-dir dist \
            --smoke-result pass \
            --signing-status "${{ steps.sign-windows.outputs.signing_status }}" \
            --target-os windows-x64

      - name: Verify Windows artifact checksum
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          python scripts/devtools/verify_windows_artifact_checksum.py \
            --artifact dist/newsletter_web.exe \
            --checksum-file dist/SHA256SUMS.txt

      - name: Build Windows support bundle
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          python scripts/devtools/create_support_bundle.py \
            --artifact dist/newsletter_web.exe \
            --dist-dir dist \
            --output dist/support-bundle.zip

      - name: Validate Windows release artifacts
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/heads/release/* ]]; then
            python scripts/devtools/validate_windows_release_artifacts.py --dist-dir dist --require-signing
          else
            python scripts/devtools/validate_windows_release_artifacts.py --dist-dir dist
          fi

      - name: Generate Windows update manifest
        if: matrix.os == 'windows-latest' && vars.WINDOWS_UPDATE_BASE_URL != ''
        shell: bash
        run: |
          python scripts/devtools/generate_windows_update_manifest.py \
            --metadata dist/release-metadata.json \
            --output dist/update-manifest.json \
            --base-url "${{ vars.WINDOWS_UPDATE_BASE_URL }}"

      - name: Upload build artifacts
        if: matrix.os == 'windows-latest' && always()
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts-${{ matrix.os }}
          path: |
            dist/
            *.exe
            *.spec
          if-no-files-found: warn

  # ========================================
  # Stage 7: Main Branch Burn-in Gate
  # ========================================
  windows-burnin-gate:
    name: Windows Burn-in Gate (main)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [build-check]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Evaluate Windows CI burn-in success rate
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python scripts/devtools/windows_ci_burnin_report.py \
            --workflow "Main CI Pipeline" \
            --branch main \
            --limit 10 \
            --min-success-rate 95 \
            --output artifacts/windows-ci-burnin.json

      - name: Upload windows burn-in artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-ci-burnin-${{ github.run_id }}
          path: artifacts/windows-ci-burnin.json
          if-no-files-found: error
