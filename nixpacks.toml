[providers]
python = "3.11"

[variables]
PYTHONPATH = "/app"
NIXPACKS_PYTHON_VERSION = "3.11"
WEB_CONCURRENCY = "2"

[phases.setup]
nixPkgs = ["nodejs", "npm"]

[phases.install]
cmds = [
    "pip install --upgrade pip",
    "pip install -r requirements.txt",
    "pip install gunicorn redis rq"
]

[start]
cmd = "gunicorn --bind 0.0.0.0:${PORT:-8000} --workers ${WEB_CONCURRENCY:-2} --timeout 300 web.app:app"
